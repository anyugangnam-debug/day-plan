<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루플랜</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 대시보드 뷰 (새로운 메인 화면) -->
        <div id="view-dashboard" class="view active">
            <header>
                <div class="header-title">
                    <h1>내 하루 🌱</h1>
                    <div class="header-actions">
                        <button id="theme-toggle-dash" class="icon-btn theme-toggle" title="다크/라이트 모드"><i class="fas fa-moon"></i></button>
                    </div>
                </div>
                <div class="date-display-container">
                    <span id="dash-date" class="date-display" style="font-size: 1.1rem; color: var(--primary-color);"></span>
                    <label class="date-picker-label" title="날짜 변경">
                        <i class="fas fa-calendar-day"></i>
                        <input type="date" id="dash-date-picker" class="hidden-date-picker">
                    </label>
                </div>
            </header>
            <main class="dashboard-main">
                <div class="greeting-message">
                    오늘도 행복한 하루 보내세요! 🌻
                </div>
                
                <!-- 나의 목표 섹션 -->
                <div class="dashboard-card goal-section">
                    <div class="card-header">
                        <h3><i class="fas fa-bullseye" style="color: var(--primary-color);"></i> 나의 목표</h3>
                        <button id="edit-goal-btn" class="icon-btn-small" title="목표 수정"><i class="fas fa-edit"></i></button>
                    </div>
                    <div id="goal-display" class="goal-content">아직 설정된 목표가 없습니다.<br>수정 버튼을 눌러 목표를 작성해보세요!</div>
                    <textarea id="goal-input" class="goal-input hidden" placeholder="이루고 싶은 목표를 적어보세요..."></textarea>
                    <button id="save-goal-btn" class="action-btn-small hidden">저장</button>
                </div>

                <div class="dashboard-grid">
                    <button class="widget-btn" data-target="schedule">
                        <div class="widget-icon">⏰</div>
                        <div class="widget-title">스케줄</div>
                        <div class="widget-desc">시간대별로 차곡차곡</div>
                    </button>
                    <button class="widget-btn" data-target="daily">
                        <div class="widget-icon">📝</div>
                        <div class="widget-title">To do list</div>
                        <div class="widget-desc">오늘 할 일 체크!</div>
                    </button>
                    <button class="widget-btn" data-target="history">
                        <div class="widget-icon">📚</div>
                        <div class="widget-title">기록</div>
                        <div class="widget-desc">나의 지나온 날들</div>
                    </button>
                </div>

                <!-- 하루 메모 섹션 (주석) -->
                <div class="dashboard-card memo-section">
                    <div class="card-header">
                        <h3><i class="fas fa-comment-dots" style="color: var(--primary-color);"></i> 하루 메모</h3>
                        <span id="memo-saved-indicator" class="saved-indicator hidden"><i class="fas fa-check"></i> 저장됨</span>
                    </div>
                    <textarea id="daily-memo" class="memo-input" placeholder="이 날의 기록이나 생각에 대해 주석이나 메모를 남겨보세요..."></textarea>
                </div>
            </main>
        </div>

        <!-- 스케줄 뷰: 시간대별 일정 -->
        <div id="view-schedule" class="view hidden">
            <header>
                <div class="header-title">
                    <h1>스케줄 ⏰</h1>
                    <div class="header-actions">
                        <button id="theme-toggle-schedule" class="icon-btn theme-toggle" title="다크/라이트 모드"><i class="fas fa-moon"></i></button>
                    </div>
                </div>
                <div class="date-display-container">
                    <span id="schedule-date" class="date-display"></span>
                    <label class="date-picker-label" title="날짜 변경">
                        <i class="fas fa-calendar-day"></i>
                        <input type="date" id="schedule-date-picker" class="hidden-date-picker">
                    </label>
                </div>
            </header>
            <main>
                <div class="schedule-container" id="hourly-schedule">
                    <!-- 24시간 슬롯 동적 생성 -->
                </div>
            </main>
        </div>

        <!-- 메인 뷰: 하루 플랜 (오늘 또는 과거) -->
        <div id="view-daily" class="view hidden">
            <header>
                <div class="header-title">
                    <h1 id="daily-view-title">To do list 📝</h1>
                    <div class="header-actions">
                        <button id="theme-toggle-daily" class="icon-btn theme-toggle" title="다크/라이트 모드"><i class="fas fa-moon"></i></button>
                        <button id="delete-day-btn" class="icon-btn" title="이 날의 플랜 전체 삭제" style="display: none;"><i class="fas fa-trash-alt"></i></button>
                    </div>
                </div>
                <div class="date-display-container">
                    <span id="current-date" class="date-display"></span>
                    <label class="date-picker-label" title="날짜 변경">
                        <i class="fas fa-calendar-day"></i>
                        <input type="date" id="daily-date-picker" class="hidden-date-picker">
                    </label>
                </div>
            </header>
            
            <main>
                <div class="input-section">
                    <button id="priority-toggle" class="icon-btn priority-btn" title="중요도 설정"><i class="far fa-star"></i></button>
                    <input type="text" id="task-input" placeholder="새로운 플랜을 작성해주세요..." autocomplete="off">
                    <button id="add-btn"><i class="fas fa-plus"></i> 추가</button>
                </div>
                
                <div class="list-container" id="daily-list-container">
                    <!-- 중요 플랜 층 -->
                    <div id="section-high" class="priority-section hidden">
                        <h3 class="section-title"><i class="fas fa-star priority-icon"></i> 중요한 플랜</h3>
                        <ul id="task-list-high" class="task-list"></ul>
                    </div>
                    
                    <!-- 일반 플랜 층 -->
                    <div id="section-normal" class="priority-section hidden">
                        <h3 class="section-title"><i class="fas fa-list-ul"></i> 일반 플랜</h3>
                        <ul id="task-list-normal" class="task-list"></ul>
                    </div>

                    <!-- 빈 상태 메시지 -->
                    <div id="empty-state-daily" class="empty-state hidden"></div>
                </div>
            </main>
        </div>

        <!-- 기록 뷰: 전체 하루 플랜 -->
        <div id="view-history" class="view hidden">
            <header>
                <div class="header-title">
                    <h1>전체 기록 📚</h1>
                    <div class="header-actions">
                        <button id="theme-toggle-hist" class="icon-btn theme-toggle" title="다크/라이트 모드"><i class="fas fa-moon"></i></button>
                    </div>
                </div>
                <div class="date-display">과거의 플랜들을 한눈에 확인하세요</div>
            </header>
            
            <main>
                <div id="history-container" class="history-container">
                    <!-- 날짜별 블록이 동적으로 생성됩니다 -->
                </div>
            </main>
        </div>

        <!-- 하단 네비게이션 -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-target="dashboard">
                <i class="fas fa-home"></i>
                <span>홈</span>
            </button>
            <button class="nav-item" data-target="schedule">
                <i class="fas fa-clock"></i>
                <span>스케줄</span>
            </button>
            <button class="nav-item" data-target="daily">
                <i class="fas fa-check-square"></i>
                <span>To do</span>
            </button>
            <button class="nav-item" data-target="history">
                <i class="fas fa-book-open"></i>
                <span>기록</span>
            </button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
