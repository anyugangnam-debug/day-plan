<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>하루플랜 | 하루를 효율적으로 관리하는 웹 앱</title>
    <meta name="description" content="하루플랜은 일정, To do, 기록을 통해 생산성을 높이는 웹 앱입니다.">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body data-theme="light">
    <script>
        if (localStorage.getItem('haruTheme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
        }
    </script>
    <div class="app-container" style="overflow-y: auto; display: block; padding: 20px;">
        <header style="margin-bottom: 20px; text-align: left;">
            <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">
                <i class="fas fa-arrow-left"></i> 돌아가기
            </a>
            <h1 style="margin-top: 20px; font-size: 1.5rem;">문의하기 ✉️</h1>
        </header>
        
        <main class="dashboard-card" style="line-height: 1.6; text-align: center;">
            <p>하루플랜 서비스 관련 문의, 오류 제보, 개선 요청 등을 자유롭게 남겨주세요.</p>
            
            <form action="https://formsubmit.co/tatakuid@gmail.com" method="POST" style="margin-top: 25px; text-align: left;">
                <input type="text" name="_honey" style="display:none">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_subject" value="[하루플랜] 새로운 문의가 접수되었습니다">
                
                <div style="margin-bottom: 16px;">
                    <label for="email" style="display:block; margin-bottom: 8px; font-weight: 600; color: var(--text-main);">답변 받을 이메일</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com" style="width: 100%; padding: 12px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 1rem; outline: none;">
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label for="message" style="display:block; margin-bottom: 8px; font-weight: 600; color: var(--text-main);">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="오류 제보, 기능 건의, 기타 소중한 의견을 상세히 적어주세요." style="width: 100%; padding: 12px; min-height: 120px; border: 2px solid var(--border-color); border-radius: 12px; font-size: 1rem; outline: none; resize: none;"></textarea>
                </div>
                
                <button type="submit" style="width: 100%; background-color: var(--primary-color); color: white; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer;">
                    <i class="fas fa-paper-plane" style="margin-right: 6px;"></i> 이메일 보내기
                </button>
            </form>
        </main>
        
        <footer style="margin-top: 30px; text-align: center; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid var(--border-color); padding-top: 20px;">
            <div style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 15px;">
                <a href="index.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">홈</a>
                <a href="about.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">소개</a>
                <a href="privacy.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">개인정보처리방침</a>
                <a href="contact.html" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">문의하기</a>
            </div>
            <p>&copy; 하루플랜. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
